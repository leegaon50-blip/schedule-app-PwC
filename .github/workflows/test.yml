name: Jest Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'services/**'
      - 'db/**'
      - 'tests/**'
      - '*.test.js'
      - 'package.json'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Rebuild better-sqlite3 for Node (postinstall built it for Electron)
        run: npm rebuild better-sqlite3

      - name: Run Jest tests
        run: npm test

      - name: Coverage summary
        if: always()
        run: npx jest --coverage --coverageReporters=text-summary
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        continue-on-error: true
